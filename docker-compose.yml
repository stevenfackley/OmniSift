version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL with pgvector extension
  # ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: omnisift-db
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnisift} -d ${POSTGRES_DB:-omnisift}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # ASP.NET Core Web API (Backend)
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/OmniSift.Api/Dockerfile
    container_name: omnisift-api
    restart: unless-stopped
    env_file: .env.dev
    environment:
      ASPNETCORE_URLS: http://+:8080
      # Map conventional env var names from .env.dev to .NET config key format
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Tavily__ApiKey: ${TAVILY_API_KEY}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      # Use the omnisift_app role (not superuser) so RLS policies are enforced
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=omnisift_app;Password=${POSTGRES_PASSWORD}"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Blazor WebAssembly Frontend
  # ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: src/OmniSift.Web/Dockerfile
    container_name: omnisift-web
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "5080:80"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
