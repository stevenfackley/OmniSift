name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore OmniSift.sln

      - name: Build
        run: dotnet build OmniSift.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test OmniSift.sln --no-build --configuration Release --logger "console;verbosity=normal"
